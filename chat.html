<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Likering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            
            --plan-azul: #00d2ff;
            --plan-rojo: #ff2d55;
            --plan-naranja: #ff9500;
            --plan-verde: #4cd964;
            --plan-morado: #af52de;
            --plan-amarillo: #ffcc00; 
            --plan-rosado: #ff2d55;
            --plan-fucsia: #ff375f;
            --plan-marron: #ac8e68;
            --plan-gris: #8e8e93;

            --plan-color-principal: var(--plan-azul);
        }

        .plan-azul { --plan-color-principal: var(--plan-azul); }
        .plan-rojo { --plan-color-principal: var(--plan-rojo); }
        .plan-naranja { --plan-color-principal: var(--plan-naranja); }
        .plan-verde { --plan-color-principal: var(--plan-verde); }
        .plan-morado { --plan-color-principal: var(--plan-morado); }
        .plan-amarillo { --plan-color-principal: var(--plan-amarillo); }
        .plan-rosado { --plan-color-principal: var(--plan-rosado); }
        .plan-fucsia { --plan-color-principal: var(--plan-fucsia); }
        .plan-marron { --plan-color-principal: var(--plan-marron); }
        .plan-gris { --plan-color-principal: var(--plan-gris); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Fondo Animado */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--plan-color-principal);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; opacity: 0.1; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .chat-app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(10,10,11,0.4);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
        }

        /* Header */
        .chat-header {
            padding: 50px 20px 20px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .chat-user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            border: 2px solid var(--plan-color-principal);
            background-size: cover;
            background-position: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .chat-user-details h2 {
            font-size: 1rem;
            font-weight: 700;
        }

        .chat-user-status {
            font-size: 0.75rem;
            color: var(--plan-verde);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--plan-verde);
            box-shadow: 0 0 10px var(--plan-verde);
        }

        /* Mensajes */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }

        .messages-container::-webkit-scrollbar { display: none; }

        .message-wrapper {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            animation: message-in 0.3s ease-out;
        }

        @keyframes message-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }

        .sent .message-bubble {
            background: var(--plan-color-principal);
            color: #000;
            font-weight: 500;
            border-bottom-right-radius: 4px;
        }

        .received .message-bubble {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .message-info {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .message-input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: var(--plan-color-principal);
            background: rgba(255,255,255,0.05);
        }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 18px;
            background: var(--plan-color-principal);
            color: #000;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-send:hover {
            transform: scale(1.05) rotate(-10deg);
        }

        /* Modal Eliminar */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modern-modal {
            background: #151517;
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-danger { background: var(--plan-rojo); color: white; }
        .btn-cancel { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); }

        @media (max-width: 480px) {
            .chat-app { border: none; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="chat-app">
        <header class="chat-header">
            <a href="mensajes.html" class="btn-back">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div class="chat-user-info">
                <div id="chat-avatar" class="chat-avatar"></div>
                <div class="chat-user-details">
                    <h2 id="chat-username">@usuario</h2>
                    <div class="chat-user-status">
                        <div class="status-dot"></div>
                        <span>En línea</span>
                    </div>
                </div>
            </div>
            <div class="btn-back" id="info-btn" style="cursor: pointer;">
                <i class="fas fa-info-circle"></i>
            </div>
        </header>

        <div class="messages-container" id="messages-container">
            <!-- Mensajes dinámicos -->
        </div>

        <div class="input-area">
            <input type="text" class="message-input" id="message-input" placeholder="Escribe un mensaje...">
            <button class="btn-send" id="send-button">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Modal Eliminar -->
    <div class="modal-overlay" id="delete-message-modal">
        <div class="modern-modal">
            <i class="fas fa-trash-alt" style="font-size: 2.5rem; color: var(--plan-rojo); margin-bottom: 15px;"></i>
            <h3>¿Eliminar mensaje?</h3>
            <p style="color: var(--text-secondary); font-size: 0.85rem; margin: 10px 0 20px;">Esta acción no se puede deshacer.</p>
            <button class="modal-btn btn-danger" id="confirm-delete-btn">Eliminar</button>
            <button class="modal-btn btn-cancel" id="cancel-delete-btn">Cancelar</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let loggedInUser = null;
        let chatUser = null;
        let messagesInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!loggedInUser) return window.location.href = 'index.html';

            const urlParams = new URLSearchParams(window.location.search);
            chatUser = urlParams.get('user');
            if (!chatUser) return window.location.href = 'mensajes.html';

            document.body.className = `plan-${loggedInUser.plan.toLowerCase()}`;
            document.getElementById('chat-username').textContent = `@${chatUser}`;

            loadUserProfile();
            loadMessages();
            setupEventListeners();

            messagesInterval = setInterval(() => loadMessages(true), 3000);
        });

        async function loadUserProfile() {
            try {
                const res = await API.getUserProfile(chatUser);
                if (res.success) {
                    const avatar = document.getElementById('chat-avatar');
                    avatar.style.backgroundImage = `url('${res.data.imageUrl}')`;
                    avatar.onclick = () => window.location.href = `streamer.html?user=${chatUser}`;
                }
            } catch (e) {}
        }

        async function loadMessages(silent = false) {
            const container = document.getElementById('messages-container');
            try {
                const res = await API.getMessages(loggedInUser.username, chatUser);
                if (res.success) {
                    const messagesHTML = res.data.map(msg => {
                        const isSent = msg.emisor === loggedInUser.username;
                        return `
                            <div class="message-wrapper ${isSent ? 'sent' : 'received'}">
                                <div class="message-bubble">${msg.contenido}</div>
                                <div class="message-info">
                                    ${new Date(msg.fecha).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                    ${isSent ? `<i class="fas fa-check-double" style="color: ${msg.leido ? 'var(--plan-azul)' : 'inherit'}"></i>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    if (container.innerHTML !== messagesHTML) {
                        container.innerHTML = messagesHTML;
                        container.scrollTop = container.scrollHeight;
                    }
                }
            } catch (e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            try {
                const res = await API.sendMessage(loggedInUser.username, chatUser, text);
                if (res.success) loadMessages();
            } catch (e) {}
        }

        function setupEventListeners() {
            document.getElementById('send-button').onclick = sendMessage;
            document.getElementById('message-input').onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        }
    </script>
</body>
</html>
