<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario - Likering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            
            --plan-azul: #00d2ff;
            --plan-rojo: #ff2d55;
            --plan-naranja: #ff9500;
            --plan-verde: #4cd964;
            --plan-morado: #af52de;
            --plan-amarillo: #ffcc00; 
            --plan-rosado: #ff2d55;
            --plan-fucsia: #ff375f;
            --plan-marron: #ac8e68;
            --plan-gris: #8e8e93;

            --plan-color-principal: var(--plan-azul);
        }

        .plan-azul { --plan-color-principal: var(--plan-azul); }
        .plan-rojo { --plan-color-principal: var(--plan-rojo); }
        .plan-naranja { --plan-color-principal: var(--plan-naranja); }
        .plan-verde { --plan-color-principal: var(--plan-verde); }
        .plan-morado { --plan-color-principal: var(--plan-morado); }
        .plan-amarillo { --plan-color-principal: var(--plan-amarillo); }
        .plan-rosado { --plan-color-principal: var(--plan-rosado); }
        .plan-fucsia { --plan-color-principal: var(--plan-fucsia); }
        .plan-marron { --plan-color-principal: var(--plan-marron); }
        .plan-gris { --plan-color-principal: var(--plan-gris); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Animado */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--plan-color-principal);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; opacity: 0.1; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .profile-app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Header */
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--plan-color-principal);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin: 0 auto 20px;
        }

        .username { font-size: 1.6rem; font-weight: 800; margin-bottom: 5px; }
        
        .plan-badge {
            display: inline-block;
            padding: 6px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--plan-color-principal);
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-value { font-size: 1.1rem; font-weight: 800; }
        .stat-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; }

        /* Actions */
        .actions-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
        }

        .btn-follow {
            background: var(--plan-color-principal);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn-follow.following {
            background: var(--glass-bg);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-message {
            width: 55px;
            height: 55px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        /* Video List */
        .content-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .video-list { display: flex; flex-direction: column; gap: 15px; }

        .video-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            background: rgba(255,255,255,0.05);
            transform: scale(1.02);
            border-color: var(--plan-color-principal);
        }

        .video-thumb {
            width: 80px;
            height: 110px;
            border-radius: 15px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .video-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .video-info { flex: 1; min-width: 0; }
        .video-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-stats { font-size: 0.75rem; color: var(--text-secondary); display: flex; gap: 12px; }
        .video-stats i { color: var(--plan-color-principal); margin-right: 4px; }

        @media (max-width: 480px) {
            .profile-app { padding-bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="profile-app">
        <header class="header-nav">
            <a href="videos.html" class="btn-icon">
                <i class="fas fa-chevron-left"></i>
            </a>
            <img src="https://i.postimg.cc/FKgZRLrW/image.png" alt="Likering" style="height: 35px;">
            <div class="btn-icon" id="share-btn" style="cursor: pointer;">
                <i class="fas fa-share-alt"></i>
            </div>
        </header>

        <div class="profile-card">
            <div id="profile-picture" class="avatar"></div>
            <h2 class="username" id="profile-username">@usuario</h2>
            <div class="plan-badge" id="profile-bio">PLAN AZUL</div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="stat-value" id="posts-count">0</span>
                    <span class="stat-label">Posts</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="followers-count">0</span>
                    <span class="stat-label">Fans</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="likes-count">0</span>
                    <span class="stat-label">Likes</span>
                </div>
            </div>
        </div>

        <div class="actions-row">
            <button class="btn-follow" id="follow-btn">Seguir</button>
            <div class="btn-message" id="message-btn">
                <i class="fas fa-comment-dots"></i>
            </div>
        </div>

        <div class="content-section">
            <h3 class="section-title"><i class="fas fa-play-circle"></i> Contenido</h3>
            <div class="video-list" id="video-grid-container">
                <!-- Videos dinámicos -->
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let loggedInUser = null;
        let streamerUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            
            const urlParams = new URLSearchParams(window.location.search);
            streamerUser = urlParams.get('user');
            if (!streamerUser) return window.location.href = 'videos.html';

            loadProfile();
            loadVideos();
            setupEventListeners();
        });

        async function loadProfile() {
            try {
                const res = await API.getUserProfile(streamerUser);
                if (res.success) {
                    document.body.className = `plan-${res.data.plan.toLowerCase()}`;
                    document.getElementById('profile-username').textContent = `@${res.data.username}`;
                    document.getElementById('profile-picture').style.backgroundImage = `url('${res.data.imageUrl}')`;
                    document.getElementById('profile-bio').textContent = `PLAN ${res.data.plan.toUpperCase()}`;
                    document.getElementById('followers-count').textContent = res.data.followers || '0';
                    document.getElementById('likes-count').textContent = res.data.likes || '0';
                }
            } catch (e) {}
        }

        async function loadVideos() {
            const container = document.getElementById('video-grid-container');
            try {
                const res = await API.getVideosForUser(streamerUser);
                if (res.success) {
                    document.getElementById('posts-count').textContent = res.data.length;
                    if (res.data.length === 0) {
                        container.innerHTML = `<p style="text-align:center; color:var(--text-secondary); padding:20px;">No hay videos aún.</p>`;
                        return;
                    }
                    container.innerHTML = res.data.map(video => `
                        <div class="video-card" onclick="window.location.href='videos.html?user=${video.user}&videoId=${video.videoId}'">
                            <div class="video-thumb">
                                <img src="${video.thumbnailUrl}">
                            </div>
                            <div class="video-info">
                                <div class="video-title">${video.titulo || 'Sin título'}</div>
                                <div class="video-stats">
                                    <span><i class="fas fa-play"></i> ${video.visualizaciones || 0}</span>
                                    <span><i class="fas fa-heart"></i> ${video.likes || 0}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-right" style="opacity: 0.3;"></i>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        function setupEventListeners() {
            document.getElementById('message-btn').onclick = () => {
                window.location.href = `chat.html?user=${streamerUser}`;
            };
            
            const followBtn = document.getElementById('follow-btn');
            followBtn.onclick = () => {
                followBtn.classList.toggle('following');
                followBtn.textContent = followBtn.classList.contains('following') ? 'Siguiendo' : 'Seguir';
            };
        }
    </script>
</body>
</html>
