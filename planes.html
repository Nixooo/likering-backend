<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes Premium - Likering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            
            /* Colores de planes mejorados */
            --plan-azul: #00d2ff;
            --plan-rojo: #ff2d55;
            --plan-naranja: #ff9500;
            --plan-verde: #4cd964;
            --plan-morado: #af52de;
            --plan-amarillo: #ffcc00; 
            --plan-rosado: #ff2d55;
            --plan-fucsia: #ff375f;
            --plan-marron: #ac8e68;
            --plan-gris: #8e8e93;

            --plan-color-principal: var(--plan-azul);
            --accent-gradient: linear-gradient(135deg, var(--plan-color-principal), #000);
        }

        .plan-azul { --plan-color-principal: var(--plan-azul); }
        .plan-rojo { --plan-color-principal: var(--plan-rojo); }
        .plan-naranja { --plan-color-principal: var(--plan-naranja); }
        .plan-verde { --plan-color-principal: var(--plan-verde); }
        .plan-morado { --plan-color-principal: var(--plan-morado); }
        .plan-amarillo { --plan-color-principal: var(--plan-amarillo); }
        .plan-rosado { --plan-color-principal: var(--plan-rosado); }
        .plan-fucsia { --plan-color-principal: var(--plan-fucsia); }
        .plan-marron { --plan-color-principal: var(--plan-marron); }
        .plan-gris { --plan-color-principal: var(--plan-gris); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo Animado Mejorado */
        .app-screen {
            width: 100%;
            min-height: 100vh;
            position: relative;
            padding: 40px 20px 100px;
            display: flex;
            justify-content: center;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--plan-color-principal);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; opacity: 0.1; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .planes-content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Header Moderno */
        .planes-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(-3px);
        }

        .header-titles h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-titles p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .brand-logo {
            width: 40px;
            height: 40px;
            opacity: 0.9;
        }

        /* Grid de Planes (Inspirado en Billetera) */
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .modern-plan-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .modern-plan-card:hover {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255,255,255,0.05);
            border-color: var(--plan-accent);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .modern-plan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, var(--plan-accent), transparent 70%);
            opacity: 0.1;
            pointer-events: none;
        }

        .plan-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .plan-card-icon {
            width: 55px;
            height: 55px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: var(--plan-accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .plan-card-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .plan-card-info .price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--plan-accent);
            letter-spacing: -0.5px;
        }

        .plan-card-benefits {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .plan-card-benefits li {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .plan-card-benefits li i {
            font-size: 0.9rem;
            color: var(--plan-accent);
        }

        .plan-card-benefits li b {
            color: white;
            font-weight: 600;
        }

        /* Estilo del botón de Wompi (Unificado) */
        .btn-buy-container {
            width: 100%;
            margin-top: auto;
        }

        .wompi-button-caption { display: none !important; }

        /* Colores dinámicos para las tarjetas de planes */
        .plan-azul-modern { --plan-accent: var(--plan-azul); }
        .plan-rojo-modern { --plan-accent: var(--plan-rojo); }
        .plan-naranja-modern { --plan-accent: var(--plan-naranja); }
        .plan-amarillo-modern { --plan-accent: var(--plan-amarillo); }
        .plan-rosado-modern { --plan-accent: var(--plan-rosado); }
        .plan-fucsia-modern { --plan-accent: var(--plan-fucsia); }
        .plan-verde-modern { --plan-accent: var(--plan-verde); }
        .plan-marron-modern { --plan-accent: var(--plan-marron); }
        .plan-gris-modern { --plan-accent: var(--plan-gris); }
        .plan-morado-modern { --plan-accent: var(--plan-morado); }

        .btn-buy-plan {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 18px;
            background: var(--plan-accent);
            color: #000;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-buy-plan:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        @media (max-width: 600px) {
            .header-titles h1 { font-size: 1.4rem; }
            .plans-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-screen">
        <div class="planes-content">
            <!-- Header -->
            <header class="planes-header">
                <div class="header-left">
                    <a href="billetera.html" class="btn-back">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <div class="header-titles">
                        <h1>Planes Premium</h1>
                        <p>Maximiza tu potencial en Likering</p>
                    </div>
                </div>
                <div class="header-right">
                    <img src="https://i.postimg.cc/FKgZRLrW/image.png" alt="Likering" class="brand-logo">
                </div>
            </header>

            <div class="plans-grid" id="plans-container">
                <!-- Los planes se cargarán dinámicamente -->
            </div>

            <!-- Guía de Pruebas Sandbox Wompi -->
            <div style="background: rgba(255, 149, 0, 0.08); border: 1px dashed #ff9500; border-radius: 24px; padding: 20px; margin-top: 10px; max-width: 500px; margin-left: auto; margin-right: auto;">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                    <i class="fas fa-flask" style="color: #ff9500;"></i>
                    <h3 style="font-size: 0.95rem; font-weight: 700; color: #ff9500;">Modo Sandbox: Datos de Prueba</h3>
                </div>
                <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
                    <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; font-size: 0.8rem;">
                        <strong style="display: block; margin-bottom: 5px; color: #4cd964;"><i class="fas fa-check-circle"></i> Para APROBAR (Nequi):</strong>
                        <code>3991111111</code>
                    </div>
                    <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; font-size: 0.8rem;">
                        <strong style="display: block; margin-bottom: 5px; color: #ff2d55;"><i class="fas fa-times-circle"></i> Para RECHAZAR (Nequi):</strong>
                        <code>3992222222</code>
                    </div>
                    <div style="background: rgba(255,255,255,0.03); padding: 12px; border-radius: 14px; font-size: 0.8rem;">
                        <strong style="display: block; margin-bottom: 5px; color: var(--plan-azul);"><i class="fas fa-credit-card"></i> Tarjeta Aprobada:</strong>
                        <code>4242 4242 4242 4242</code>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://checkout.wompi.co/widget.js"></script>
    <script src="config.js"></script>
    <script>
        const plans = [
            { id: 'AZUL', name: 'Plan Azul', price: '$15.000', cents: 1500000, icon: 'fa-gem', class: 'plan-azul-modern', earnings: '$1.5M', likes: 1, limit: 300 },
            { id: 'ROJO', name: 'Plan Rojo', price: '$60.000', cents: 6000000, icon: 'fa-fire', class: 'plan-rojo-modern', earnings: '$2M', likes: 4, limit: 400 },
            { id: 'NARANJA', name: 'Plan Naranja', price: '$90.000', cents: 9000000, icon: 'fa-bolt', class: 'plan-naranja-modern', earnings: '$2.5M', likes: 18, limit: 500 },
            { id: 'AMARILLO', name: 'Plan Amarillo', price: '$300.000', cents: 30000000, icon: 'fa-star', class: 'plan-amarillo-modern', earnings: '$5M', likes: 60, limit: '1.000' },
            { id: 'ROSADO', name: 'Plan Rosado', price: '$600.000', cents: 60000000, icon: 'fa-heart', class: 'plan-rosado-modern', earnings: '$10M', likes: 120, limit: '2.000' },
            { id: 'FUCSIA', name: 'Plan Fucsia', price: '$900.000', cents: 90000000, icon: 'fa-crown', class: 'plan-fucsia-modern', earnings: '$20M', likes: 180, limit: '4.000' },
            { id: 'VERDE', name: 'Plan Verde', price: '$1.200.000', cents: 120000000, icon: 'fa-leaf', class: 'plan-verde-modern', earnings: '$40M', likes: 240, limit: '8.000' },
            { id: 'MARRON', name: 'Plan Marrón', price: '$1.500.000', cents: 150000000, icon: 'fa-coffee', class: 'plan-marron-modern', earnings: '$60M', likes: 300, limit: '12.000' },
            { id: 'GRIS', name: 'Plan Gris', price: '$1.800.000', cents: 180000000, icon: 'fa-shield-alt', class: 'plan-gris-modern', earnings: '$80M', likes: 360, limit: '16.000' },
            { id: 'MORADO', name: 'Plan Morado', price: '$2.100.000', cents: 210000000, icon: 'fa-magic', class: 'plan-morado-modern', earnings: '$100M', likes: 420, limit: '20.000' }
        ];

        function renderPlans() {
            const container = document.getElementById('plans-container');
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            
            if (loggedInUser && loggedInUser.plan) {
                document.body.className = `plan-${loggedInUser.plan.toLowerCase()}`;
            }

            container.innerHTML = plans.map(plan => `
                <div class="modern-plan-card ${plan.class}">
                    <div class="plan-card-header">
                        <div class="plan-card-icon"><i class="fas ${plan.icon}"></i></div>
                        <div class="plan-card-info">
                            <h3>${plan.name}</h3>
                            <div class="price">${plan.price}</div>
                        </div>
                    </div>
                    <ul class="plan-benefits">
                        <li><i class="fas fa-check"></i> Gana hasta <b>${plan.earnings}</b></li>
                        <li><i class="fas fa-heart"></i> <b>${plan.likes} Like${plan.likes > 1 ? 's' : ''}</b> iniciales</li>
                        <li><i class="fas fa-users"></i> Límite de <b>${plan.limit} Likes</b></li>
                    </ul>
                    <div class="btn-buy-container">
                        <button class="btn-buy-plan" onclick="openWompiCheckout('${plan.id}', ${plan.cents}, '${plan.name}')">
                            <i class="fas fa-shopping-cart"></i> Paga con Wompi
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function openWompiCheckout(planId, amountInCents, planName) {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!loggedInUser) return alert('Debes iniciar sesión para realizar compras');
            
            const userId = loggedInUser.id || loggedInUser.user_id;
            const reference = `PLAN_${planId}_${userId}_${Date.now()}`;
            const currency = 'COP';

            const signatureUrl = `${API_BASE_URL}/wompi/generate-signature`;
            try {
                let signature;
                let lastResponseText = '';
                let lastStatus = 0;

                for (let attempt = 0; attempt < 5; attempt++) {
                    const response = await fetch(signatureUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ reference, amountInCents, currency })
                    });

                    lastStatus = response.status;
                    lastResponseText = await response.text();
                    console.log('Respuesta del servidor:', lastResponseText);

                    const textTrimmed = (lastResponseText || '').trim();
                    const looksLikeHtml = textTrimmed.startsWith('<') || textTrimmed.includes('Service waking up');

                    if (response.ok && textTrimmed && !looksLikeHtml) {
                        let signatureData;
                        try {
                            signatureData = JSON.parse(lastResponseText);
                        } catch (e) {
                            throw new Error(`La respuesta del servidor no es un JSON válido: ${lastResponseText}`);
                        }
                        signature = signatureData && signatureData.signature;
                        if (signature) break;
                    }

                    if (attempt < 4) {
                        await new Promise(resolve => setTimeout(resolve, 1500 * (attempt + 1)));
                    }
                }

                if (!signature) {
                    throw new Error(`No se pudo obtener una firma válida. HTTP ${lastStatus}. Respuesta: ${lastResponseText}`);
                }

                if (typeof WidgetCheckout === 'undefined') {
                    throw new Error('El script de Wompi no se ha cargado. Verifica tu conexión.');
                }

                const checkout = new WidgetCheckout({
                    currency: currency,
                    amountInCents: amountInCents,
                    publicKey: 'pub_test_SWcuYJ81fDcaXtCfsYUrAAKv0ZvH4ywN', // Llave Sandbox real del usuario
                    signature: { integrity: signature },
                    reference: reference,
                    redirectUrl: `${window.location.origin}/billetera.html?status=success&plan=${planId.toLowerCase()}`
                });

                checkout.open(function (result) {
                    console.log('Wompi Result:', result);
                    if (result.transaction && result.transaction.status === 'APPROVED') {
                        alert('¡Transacción aprobada!');
                        window.location.href = 'billetera.html?status=success&plan=' + planId.toLowerCase();
                    }
                });
            } catch (error) {
                console.error('Error detallado Wompi:', error);
                const errorStr = error.toString();
                const helpText = errorStr.includes('Failed to fetch') 
                    ? '\n\n💡 Error de red: No se pudo conectar al servidor de firmas. Verifica que el backend esté encendido.' 
                    : `\n\nDetalle: ${errorStr}`;
                alert(`Error al iniciar Wompi: ${helpText}\n\nURL intentada: ${signatureUrl}`);
            }
        }

        // Ya no es necesaria, pero la mantenemos por compatibilidad si se llama en algún lado
        function finalizeWompiButtons() {}

        document.addEventListener('DOMContentLoaded', renderPlans);
    </script>
</body>
</html>
