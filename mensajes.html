<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes - Likering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
    
    :root {
        --dark-background: #0a0a0b;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --text-primary: #ffffff;
        --text-secondary: rgba(255, 255, 255, 0.6);
        
        --plan-azul: #00d2ff;
        --plan-rojo: #ff2d55;
        --plan-naranja: #ff9500;
        --plan-verde: #4cd964;
        --plan-morado: #af52de;
        --plan-amarillo: #ffcc00; 
        --plan-rosado: #ff2d55;
        --plan-fucsia: #ff375f;
        --plan-marron: #ac8e68;
        --plan-gris: #8e8e93;

        --plan-color-principal: var(--plan-azul);
    }

    .plan-azul { --plan-color-principal: var(--plan-azul); }
    .plan-rojo { --plan-color-principal: var(--plan-rojo); }
    .plan-naranja { --plan-color-principal: var(--plan-naranja); }
    .plan-verde { --plan-color-principal: var(--plan-verde); }
    .plan-morado { --plan-color-principal: var(--plan-morado); }
    .plan-amarillo { --plan-color-principal: var(--plan-amarillo); }
    .plan-rosado { --plan-color-principal: var(--plan-rosado); }
    .plan-fucsia { --plan-color-principal: var(--plan-fucsia); }
    .plan-marron { --plan-color-principal: var(--plan-marron); }
    .plan-gris { --plan-color-principal: var(--plan-gris); }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--dark-background);
        margin: 0;
        font-family: 'Poppins', sans-serif;
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
    }

    .background-blobs {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .blob {
        position: absolute;
        width: 500px;
        height: 500px;
        background: var(--plan-color-principal);
        filter: blur(120px);
        opacity: 0.1;
        border-radius: 50%;
        animation: blob-float 20s infinite alternate;
    }

    .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
    .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; }

    @keyframes blob-float {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(50px, 100px) scale(1.2); }
    }

    .app-screen {
        width: 100%;
        min-height: 100vh;
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
    }

    .messages-header {
        width: 100%;
        padding: 60px 25px 30px;
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .header-top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
    }

    .header-icon {
        width: 45px;
        height: 45px;
        border-radius: 15px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: all 0.3s ease;
    }

    .header-icon:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-2px);
    }

    .new-conversation-btn {
        background: var(--plan-color-principal);
        border: none;
        padding: 12px 20px;
        border-radius: 15px;
        color: #000;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: all 0.3s ease;
    }

    .new-conversation-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .messages-title {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 20px;
        letter-spacing: -0.5px;
    }

    .search-container {
        position: relative;
    }

    .search-input {
        width: 100%;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        padding: 15px 50px 15px 20px;
        color: white;
        font-family: inherit;
        outline: none;
        transition: all 0.3s ease;
    }

    .search-input:focus {
        border-color: var(--plan-color-principal);
        background: rgba(255,255,255,0.05);
    }

    .search-icon {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
    }

    .chat-list {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chat-item {
        display: flex;
        align-items: center;
        padding: 15px;
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
    }

    .chat-item:hover {
        background: rgba(255,255,255,0.06);
        transform: scale(1.02);
        border-color: rgba(255,255,255,0.15);
    }

    .chat-avatar {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        object-fit: cover;
        margin-right: 15px;
        border: 2px solid var(--glass-border);
    }

    .chat-info {
        flex: 1;
        min-width: 0;
    }

    .chat-info-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .chat-name {
        font-weight: 700;
        font-size: 1.05rem;
        color: var(--text-primary);
    }

    .chat-time {
        font-size: 0.75rem;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .chat-preview {
        font-size: 0.9rem;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .unread-badge {
        background: var(--plan-color-principal);
        color: #000;
        font-size: 0.7rem;
        font-weight: 800;
        padding: 4px 8px;
        border-radius: 10px;
        margin-left: 10px;
    }

    .status-indicator {
        position: absolute;
        bottom: 15px;
        left: 60px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 3px solid #151517;
        background: #4cd964;
    }

    /* Modals */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal-container {
        background: #151517;
        width: 100%;
        max-width: 400px;
        border-radius: 30px;
        border: 1px solid var(--glass-border);
        overflow: hidden;
        animation: modal-pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modal-pop {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .modal-header {
        padding: 25px 25px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .modal-body { padding: 0 25px 25px; }

    .input-container {
        display: flex;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        padding: 12px 15px;
        margin-top: 15px;
    }

    .modal-input {
        background: transparent;
        border: none;
        color: white;
        width: 100%;
        outline: none;
        font-family: inherit;
        padding-left: 5px;
    }

    .modal-footer {
        padding: 0 25px 25px;
        display: flex;
        gap: 10px;
    }

    .modal-btn {
        flex: 1;
        padding: 12px;
        border-radius: 15px;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.3s ease;
    }

    .modal-btn.primary { background: var(--plan-color-principal); color: #000; }
    .modal-btn.cancel { background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); }

    .loading-messages, .no-messages {
        text-align: center;
        padding: 50px 20px;
        color: var(--text-secondary);
    }

    .loading-messages i { font-size: 2rem; color: var(--plan-color-principal); margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-screen">
        <header class="messages-header">
            <div class="header-top-row">
                <a href="videos.html" class="header-icon"><i class="fas fa-arrow-left"></i></a>
                <button class="new-conversation-btn" id="new-message-btn">
                    <i class="fas fa-plus"></i>
                    <span>Nuevo</span>
                </button>
            </div>
            
            <h1 class="messages-title">Mensajes</h1>
            
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Buscar conversaciones..." id="search-input">
                <i class="fas fa-search search-icon"></i>
            </div>
        </header>

        <div class="modal-overlay" id="new-chat-modal">
            <div class="modal-container">
                <div class="modal-header">
                    <h3>Nueva conversación</h3>
                    <button class="modal-close" id="close-modal">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Ingresa el nombre de usuario para iniciar una conversación</p>
                    <div class="input-container">
                        <span class="username-prefix">@</span>
                        <input type="text" id="username-input" placeholder="nombre_usuario" class="modal-input">
                    </div>
                    <div class="modal-error" id="modal-error"></div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancel-btn">Cancelar</button>
                    <button class="modal-btn primary" id="start-chat-btn">Iniciar chat</button>
                </div>
            </div>
        </div>


        <div class="context-menu" id="context-menu">
            <div class="context-menu-item" id="delete-conversation">
                <i class="fas fa-trash"></i>
                <span>Eliminar conversación</span>
            </div>
        </div>


        <div class="chat-list" id="chat-list">
            <div class="loading-messages">
                <i class="fas fa-spinner"></i>
                <p>Cargando conversaciones...</p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let loggedInUser = null;
        let allConversations = [];
        let conversationsInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!loggedInUser) {
                window.location.href = 'index.html';
                return;
            }

            // Aplicar tema del usuario logueado
            document.body.className = `plan-${loggedInUser.plan.toLowerCase()}`;
            
            loadConversations();
            setupEventListeners();

            
            // Actualizar conversaciones cada 30 segundos
            conversationsInterval = setInterval(loadConversations, 30000);
        });

        async function loadConversations() {
            try {
                const result = await API.getConversations(loggedInUser.username);
                
                if (result.success) {
                    allConversations = result.data;
                    displayConversations(allConversations);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error('Error loading conversations:', error);
                document.getElementById('chat-list').innerHTML = `
                    <div class="no-messages">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Error de conexión</h3>
                        <p>No se pudieron cargar las conversaciones. Verifica tu conexión.</p>
                    </div>
                `;
            }
        }

        function displayConversations(conversations) {
            const chatList = document.getElementById('chat-list');
            
            if (conversations.length === 0) {
                chatList.innerHTML = `
                    <div class="no-messages">
                        <i class="fas fa-comments"></i>
                        <h3>Sin conversaciones</h3>
                        <p>Aún no tienes mensajes. ¡Inicia una conversación!</p>
                    </div>
                `;
                return;
            }
            
            // Ordenar por timestamp del último mensaje (más reciente primero)
            conversations.sort((a, b) => new Date(b.lastMessage.timestamp) - new Date(a.lastMessage.timestamp));
            
            chatList.innerHTML = conversations.map((conv, index) => {
                const time = formatTime(conv.lastMessage.timestamp);
                const preview = conv.lastMessage.text.length > 50 ? 
                    conv.lastMessage.text.substring(0, 50) + '...' : 
                    conv.lastMessage.text;
                
                const isFromMe = conv.lastMessage.from === loggedInUser.username;
                const displayPreview = isFromMe ? `Tú: ${preview}` : preview;
                
                return `
                    <div class="chat-item ${conv.unreadCount > 0 ? 'unread' : ''}" 
                         data-user="${conv.username}" 
                         style="animation-delay: ${index * 0.1}s">
                        <img src="${conv.imageUrl}" alt="Avatar" class="chat-avatar" 
                             onerror="this.src='https://via.placeholder.com/60/666/FFF?text=${conv.username.charAt(0).toUpperCase()}'">
                        <div class="chat-info">
                            <div class="chat-info-header">
                                <span class="chat-name">@${conv.username}</span>
                                <span class="chat-time">${time}</span>
                            </div>
                            <div class="chat-preview">${displayPreview}</div>
                        </div>
                        ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount > 99 ? '99+' : conv.unreadCount}</span>` : ''}
                        <div class="status-indicator status-online"></div>
                        <div class="chat-item-options">
                            <button class="options-btn" data-username="${conv.username}">
                                <i class="fas fa-ellipsis-v"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatTime(timestamp) {
            const now = new Date();
            const messageTime = new Date(timestamp);
            const diff = now - messageTime;
            
            // Menos de 1 minuto
            if (diff < 60000) return 'Ahora';
            
            // Menos de 1 hora
            if (diff < 3600000) {
                const minutes = Math.floor(diff / 60000);
                return `${minutes}m`;
            }
            
            // Mismo día
            if (messageTime.toDateString() === now.toDateString()) {
                return messageTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            
            // Esta semana
            if (diff < 604800000) {
                const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
                return days[messageTime.getDay()];
            }
            
            // Fecha completa
            return messageTime.toLocaleDateString('es-ES', {day: '2-digit', month: '2-digit'});
        }



        function setupEventListeners() {
            // Funcionalidad de búsqueda
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                
                if (searchTerm === '') {
                    displayConversations(allConversations);
                    return;
                }
                
                const filteredConversations = allConversations.filter(conv => 
                    conv.username.toLowerCase().includes(searchTerm) ||
                    conv.lastMessage.text.toLowerCase().includes(searchTerm)
                );
                
                if (filteredConversations.length === 0) {
                    const chatList = document.getElementById('chat-list');
                    chatList.innerHTML = `
                        <div class="no-messages">
                            <i class="fas fa-search"></i>
                            <h3>Sin resultados</h3>
                            <p>No se encontraron conversaciones que coincidan con "${searchTerm}"</p>
                        </div>
                    `;
                } else {
                    displayConversations(filteredConversations);
                }
            });

            // Click en conversaciones
            document.getElementById('chat-list').addEventListener('click', (e) => {
                const chatItem = e.target.closest('.chat-item');
                if (chatItem) {
                    const username = chatItem.dataset.user;
                    if (username) {
                        // Limpiar interval antes de navegar
                        if (conversationsInterval) {
                            clearInterval(conversationsInterval);
                        }
                        window.location.href = `chat.html?user=${username}`;
                    }
                }
            });

            // Modal para nuevo mensaje
            const modal = document.getElementById('new-chat-modal');
            const usernameInput = document.getElementById('username-input');
            const modalError = document.getElementById('modal-error');
            
            // Abrir modal
            document.getElementById('new-message-btn').addEventListener('click', () => {
                modal.classList.add('show');
                usernameInput.focus();
                usernameInput.value = '';
                modalError.classList.remove('show');
            });
            
            // Cerrar modal
            function closeModal() {
                modal.classList.remove('show');
                usernameInput.value = '';
                modalError.classList.remove('show');
            }
            
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('cancel-btn').addEventListener('click', closeModal);
            
            // Cerrar modal al hacer clic en el overlay
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });
            
            // Cerrar modal con Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('show')) {
                    closeModal();
                }
            });
            
            // Iniciar chat con Enter
            usernameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    startNewChat();
                }
            });
            
            // Botón de iniciar chat
            document.getElementById('start-chat-btn').addEventListener('click', startNewChat);
            
            function startNewChat() {
                const username = usernameInput.value.trim().replace('@', '');
                
                // Validaciones
                if (!username) {
                    showModalError('Por favor ingresa un nombre de usuario');
                    return;
                }
                
                if (username === loggedInUser.username) {
                    showModalError('No puedes enviarte mensajes a ti mismo');
                    return;
                }
                
                if (username.length < 3) {
                    showModalError('El nombre de usuario debe tener al menos 3 caracteres');
                    return;
                }
                
                if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                    showModalError('El nombre de usuario solo puede contener letras, números y guiones bajos');
                    return;
                }
                
                // Limpiar interval antes de navegar
                if (conversationsInterval) {
                    clearInterval(conversationsInterval);
                }
                
                // Navegar al chat
                window.location.href = `chat.html?user=${username}`;
            }
            
            function showModalError(message) {
                modalError.textContent = message;
                modalError.classList.add('show');
                usernameInput.focus();
                
                // Auto-ocultar error después de 5 segundos
                setTimeout(() => {
                    modalError.classList.remove('show');
                }, 5000);
            }
            
            // Limpiar error al escribir
            usernameInput.addEventListener('input', () => {
                if (modalError.classList.contains('show')) {
                    modalError.classList.remove('show');
                }
            });
        }


        // Variables para el menú contextual
        let contextMenu = null;
        let selectedUsername = null;

        // Inicializar menú contextual
        function initContextMenu() {
            contextMenu = document.getElementById('context-menu');
            
            // Event listeners para opciones
            document.addEventListener('click', (e) => {
                // Botón de opciones
                if (e.target.closest('.options-btn')) {
                    e.stopPropagation();
                    const btn = e.target.closest('.options-btn');
                    selectedUsername = btn.dataset.username;
                    showContextMenu(e.pageX, e.pageY);
                    return;
                }
                
                // Cerrar menú si se hace clic fuera
                if (contextMenu && !contextMenu.contains(e.target)) {
                    hideContextMenu();
                }
            });
            
            // Eliminar conversación
            document.getElementById('delete-conversation').addEventListener('click', () => {
                if (selectedUsername) {
                    deleteConversation(selectedUsername);
                }
                hideContextMenu();
            });
        }

        function showContextMenu(x, y) {
            if (!contextMenu) return;
            
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
            contextMenu.classList.add('show');
            
            // Ajustar posición si se sale de la pantalla
            const rect = contextMenu.getBoundingClientRect();
            if (rect.right > window.innerWidth) {
                contextMenu.style.left = `${x - rect.width}px`;
            }
            if (rect.bottom > window.innerHeight) {
                contextMenu.style.top = `${y - rect.height}px`;
            }
        }

        function hideContextMenu() {
            if (contextMenu) {
                contextMenu.classList.remove('show');
                selectedUsername = null;
            }
        }

        async function deleteConversation(username) {
            const confirmDelete = confirm(`¿Estás seguro de que quieres eliminar la conversación con @${username}?`);
            if (!confirmDelete) return;
            
            try {
                // Aquí puedes implementar la lógica para eliminar del backend
                // Por ahora, solo eliminamos localmente
                allConversations = allConversations.filter(conv => conv.username !== username);
                displayConversations(allConversations);
                
                // Mostrar mensaje de éxito
                const chatList = document.getElementById('chat-list');
                const successMsg = document.createElement('div');
                successMsg.style.cssText = 'position: fixed; top: 20px; right: 20px; background: var(--plan-verde); color: white; padding: 12px 20px; border-radius: 8px; z-index: 1001; animation: slideIn 0.3s ease;';
                successMsg.textContent = 'Conversación eliminada';
                document.body.appendChild(successMsg);
                
                setTimeout(() => {
                    successMsg.remove();
                }, 3000);
                
            } catch (error) {
                console.error('Error al eliminar conversación:', error);
                alert('Error al eliminar la conversación');
            }
        }

        // Limpiar interval al cerrar la página
        window.addEventListener('beforeunload', () => {
            if (conversationsInterval) {
                clearInterval(conversationsInterval);
            }
        });

        // Pausar actualizaciones cuando la página no está visible
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (conversationsInterval) {
                    clearInterval(conversationsInterval);
                }
            } else {
                // Reanudar actualizaciones cuando la página vuelve a ser visible
                loadConversations();
                initContextMenu(); // Agregar esta línea
                conversationsInterval = setInterval(loadConversations, 30000);
            }
        });
    </script>



</body>
</html>
