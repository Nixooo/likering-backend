<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes - Likering</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            
            --plan-azul: #00d2ff;
            --plan-rojo: #ff2d55;
            --plan-naranja: #ff9500;
            --plan-verde: #4cd964;
            --plan-morado: #af52de;
            --plan-amarillo: #ffcc00; 
            --plan-rosado: #ff2d55;
            --plan-fucsia: #ff375f;
            --plan-marron: #ac8e68;
            --plan-gris: #8e8e93;

            --plan-color-principal: var(--plan-azul);
        }

        .plan-azul { --plan-color-principal: var(--plan-azul); }
        .plan-rojo { --plan-color-principal: var(--plan-rojo); }
        .plan-naranja { --plan-color-principal: var(--plan-naranja); }
        .plan-verde { --plan-color-principal: var(--plan-verde); }
        .plan-morado { --plan-color-principal: var(--plan-morado); }
        .plan-amarillo { --plan-color-principal: var(--plan-amarillo); }
        .plan-rosado { --plan-color-principal: var(--plan-rosado); }
        .plan-fucsia { --plan-color-principal: var(--plan-fucsia); }
        .plan-marron { --plan-color-principal: var(--plan-marron); }
        .plan-gris { --plan-color-principal: var(--plan-gris); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* Fondo Animado */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--plan-color-principal);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; left: -100px; animation-delay: -5s; opacity: 0.1; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        .messages-app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(10,10,11,0.4);
            backdrop-filter: blur(10px);
            border-left: 1px solid var(--glass-border);
            border-right: 1px solid var(--glass-border);
        }

        /* Header */
        .messages-header {
            padding: 50px 25px 25px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-new {
            background: var(--plan-color-principal);
            color: #000;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }

        .search-bar {
            position: relative;
        }

        .search-input {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px 20px 12px 45px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--plan-color-principal);
            background: rgba(255,255,255,0.05);
        }

        .search-bar i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Lista de Chats */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .chat-list::-webkit-scrollbar { display: none; }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            animation: slide-up 0.4s ease-out backwards;
        }

        @keyframes slide-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-item:hover {
            background: rgba(255,255,255,0.03);
        }

        .avatar-container {
            position: relative;
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid var(--plan-color-principal);
        }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: var(--plan-verde);
            border: 3px solid var(--dark-background);
            border-radius: 50%;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .chat-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .chat-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: var(--plan-color-principal);
            color: #000;
            font-weight: 800;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        /* Modal Nuevo Chat */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show { display: flex; }

        .modern-modal {
            background: #151517;
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
        }

        .modal-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 15px 20px;
            color: white;
            font-family: inherit;
            margin: 20px 0;
            outline: none;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--plan-color-principal); color: #000; }
        .btn-cancel { background: transparent; color: white; margin-top: 10px; }

        @media (max-width: 480px) {
            .messages-app { border: none; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="messages-app">
        <header class="messages-header">
            <div class="header-top">
                <a href="videos.html" class="btn-back">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <button class="btn-new" id="new-message-btn">
                    <i class="fas fa-plus"></i>
                    <span>Nuevo</span>
                </button>
            </div>
            <h1 class="title">Mensajes</h1>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" id="search-input" placeholder="Buscar chats...">
            </div>
        </header>

        <div class="chat-list" id="chat-list">
            <!-- Cargando... -->
        </div>
    </div>

    <!-- Modal Nuevo Chat -->
    <div class="modal-overlay" id="new-chat-modal">
        <div class="modern-modal">
            <h3 style="text-align: center;">Nueva Conversación</h3>
            <p style="color: var(--text-secondary); font-size: 0.85rem; text-align: center; margin-top: 10px;">Ingresa el usuario con el que deseas hablar.</p>
            <input type="text" id="username-input" class="modal-input" placeholder="@nombre_usuario">
            <div id="modal-error" style="color: var(--plan-rojo); font-size: 0.75rem; text-align: center; margin-bottom: 10px;"></div>
            <button class="modal-btn btn-primary" id="start-chat-btn">Iniciar Chat</button>
            <button class="modal-btn btn-cancel" id="cancel-btn">Cancelar</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let loggedInUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!loggedInUser) return window.location.href = 'index.html';

            document.body.className = `plan-${loggedInUser.plan.toLowerCase()}`;
            loadConversations();
            setupEventListeners();
        });

        async function loadConversations() {
            const list = document.getElementById('chat-list');
            try {
                const res = await API.getConversations(loggedInUser.username);
                if (res.success) {
                    if (res.data.length === 0) {
                        list.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-secondary);">No tienes mensajes aún.</div>`;
                        return;
                    }
                    list.innerHTML = res.data.map((conv, i) => `
                        <div class="chat-item" onclick="window.location.href='chat.html?user=${conv.username}'" style="animation-delay: ${i*0.05}s">
                            <div class="avatar-container">
                                <img src="${conv.imageUrl}" class="chat-avatar">
                                <div class="status-dot"></div>
                            </div>
                            <div class="chat-info">
                                <div class="chat-header-info">
                                    <span class="chat-name">@${conv.username}</span>
                                    <span class="chat-time">${formatTime(conv.lastMessage.timestamp)}</span>
                                </div>
                                <div class="chat-preview">${conv.lastMessage.text}</div>
                            </div>
                            ${conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : ''}
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        function formatTime(ts) {
            const date = new Date(ts);
            const now = new Date();
            if (date.toDateString() === now.toDateString()) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return date.toLocaleDateString([], {day:'2-digit', month:'2-digit'});
        }

        function setupEventListeners() {
            const modal = document.getElementById('new-chat-modal');
            document.getElementById('new-message-btn').onclick = () => modal.classList.add('show');
            document.getElementById('cancel-btn').onclick = () => modal.classList.remove('show');
            
            document.getElementById('start-chat-btn').onclick = async () => {
                const user = document.getElementById('username-input').value.trim().replace('@', '');
                if (!user) return;
                window.location.href = `chat.html?user=${user}`;
            };

            document.getElementById('search-input').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.chat-item').forEach(item => {
                    const name = item.querySelector('.chat-name').textContent.toLowerCase();
                    item.style.display = name.includes(term) ? 'flex' : 'none';
                });
            };
        }
    </script>
</body>
</html>
