<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a Likering</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00A4E6">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/FKgZRLrW/image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --likering-pink: #F92B75;
            --likering-blue: #00A4E6;
            --accent-gradient: linear-gradient(135deg, var(--likering-pink), var(--likering-blue));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Fondo de Slideshow Animado */
        .background-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .background-slideshow div {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: image-fade 24s infinite;
        }

        .background-slideshow div:nth-child(1) { background-image: url('https://images.pexels.com/photos/1535244/pexels-photo-1535244.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'); animation-delay: 0s; }
        .background-slideshow div:nth-child(2) { background-image: url('https://images.pexels.com/photos/1799042/pexels-photo-1799042.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'); animation-delay: 6s; }
        .background-slideshow div:nth-child(3) { background-image: url('https://images.pexels.com/photos/2787216/pexels-photo-2787216.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'); animation-delay: 12s; }
        .background-slideshow div:nth-child(4) { background-image: url('https://images.pexels.com/photos/2883049/pexels-photo-2883049.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1'); animation-delay: 18s; }

        @keyframes image-fade {
            0% { opacity: 0; transform: scale(1); }
            8% { opacity: 0.6; transform: scale(1.05); }
            25% { opacity: 0.6; transform: scale(1.05); }
            33% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(10,10,11,1));
            z-index: 1;
        }

        /* Blobs Animados */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--likering-blue);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -100px; right: -100px; animation-delay: 0s; }
        .blob-2 { bottom: -100px; left: -100px; background: var(--likering-pink); animation-delay: -5s; opacity: 0.1; }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 100px) scale(1.2); }
        }

        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease-out, visibility 0s 1s;
        }

        .splash-screen .logo {
            width: 140px;
            animation: logo-pulse 2s infinite ease-in-out;
        }

        @keyframes logo-pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,164,230,0)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(0,164,230,0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,164,230,0)); }
        }

        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-footer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .splash-footer img {
            width: 150px;
            opacity: 0.8;
        }

        /* Contenido Principal */
        .app-screen {
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .form-wrapper {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .form-container {
            background: linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .form-container.shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }

        .form-container .logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .form-container h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--likering-blue);
            box-shadow: 0 0 20px rgba(0, 164, 230, 0.2);
        }

        .input-group input:focus + i {
            color: var(--likering-blue);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 30px;
            padding: 0 5px;
        }

        .actions label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .actions input[type="checkbox"] {
            accent-color: var(--likering-blue);
        }

        .actions a {
            color: var(--likering-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .form-button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: var(--accent-gradient);
            background-size: 200% auto;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .form-button:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .switch-form-link {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-decoration: none;
            display: block;
            margin-top: 10px;
            cursor: pointer;
        }

        .switch-form-link span {
            color: var(--likering-blue);
            font-weight: 700;
        }

        /* Registro: Avatar Preview */
        .image-preview-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .image-preview {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            background: rgba(255,255,255,0.05);
            border: 2px dashed var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .image-preview:hover {
            border-color: var(--likering-blue);
            background: rgba(0,164,230,0.05);
        }

        .image-preview i {
            font-size: 1.8rem;
            color: var(--text-secondary);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Modal Moderno */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modern-modal {
            background: #151517;
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-overlay.show .modern-modal {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 3.5rem;
            color: var(--likering-pink);
            margin-bottom: 20px;
        }

        .modern-modal h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .modern-modal p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            .form-container { padding: 35px 25px; }
            .form-container h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="background-slideshow">
        <div></div><div></div><div></div><div></div>
    </div>
    <div class="overlay"></div>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="splash-screen">
        <img src="https://i.postimg.cc/FKgZRLrW/image.png" alt="Likering Logo" class="logo">
        <div class="splash-footer">
            <img src="https://i.postimg.cc/9X6HZ6P6/image.png" alt="From Likering">
        </div>
    </div>

    <div class="app-screen">
        <div class="form-wrapper">
            <!-- Formulario de Login -->
            <div class="form-container" id="login-form">
                <img src="https://i.postimg.cc/PJm3mRTH/image.png" alt="Likering" class="logo">
                <h2>Bienvenido</h2>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" placeholder="Nombre de usuario">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Contraseña">
                </div>
                <div class="actions">
                    <label>
                        <input type="checkbox" id="remember-me"> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
                <button class="form-button" id="login-btn">Iniciar Sesión</button>
                <div class="switch-form-link" id="show-register">
                    ¿No tienes cuenta? <span>Regístrate aquí</span>
                </div>
            </div>

            <!-- Formulario de Registro -->
            <div class="form-container" id="register-form" style="display: none;">
                <div class="image-preview-container">
                    <div class="image-preview" id="image-preview">
                        <i class="fas fa-camera"></i>
                    </div>
                </div>
                <h2>Crear Cuenta</h2>
                <input type="file" id="image-upload" accept="image/*" capture="camera" style="display: none;">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-username" placeholder="Usuario">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" placeholder="Contraseña">
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password-confirm" placeholder="Confirmar">
                </div>
                <button class="form-button" id="register-btn">Comenzar</button>
                <div class="switch-form-link" id="show-login">
                    ¿Ya tienes cuenta? <span>Inicia sesión</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Cuenta Desactivada -->
    <div class="modal-overlay" id="account-disabled-modal">
        <div class="modern-modal">
            <div class="modal-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h2>Cuenta Desactivada</h2>
            <p>Tu cuenta ha sido desactivada por los administradores. Por favor, contáctanos para más detalles.</p>
            <button class="form-button" onclick="document.getElementById('account-disabled-modal').classList.remove('show')">
                Entendido
            </button>
        </div>
    </div>

    <script src="config.js"></script>
    
    <script>
        const IMGBB_API_KEY = "df01bb05ce03159d54c33e1e22eba2cf";

        window.addEventListener('load', async () => {
            const splashScreen = document.querySelector('.splash-screen');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const showRegisterLink = document.getElementById('show-register');
            const showLoginLink = document.getElementById('show-login');
            const loginUsernameInput = document.getElementById('login-username');
            const loginPasswordInput = document.getElementById('login-password');
            const rememberMeCheckbox = document.getElementById('remember-me');
            const loginBtn = document.getElementById('login-btn');

            // Transición Splash
            setTimeout(() => {
                splashScreen.classList.add('hidden');
            }, 2500);

            // Funciones de Login
            async function attemptLogin(username, password, isSilent = false) {
                try {
                    const result = await API.login(username, password);
                    if (result.success) {
                        if (result.data.estado === 'Desactivo' || result.data.status === 'Desactivo') {
                            if (!isSilent) {
                                document.getElementById('account-disabled-modal').classList.add('show');
                                loginForm.classList.add('shake');
                                setTimeout(() => loginForm.classList.remove('shake'), 500);
                            }
                            return false;
                        }
                        localStorage.setItem('loggedInUser', JSON.stringify(result.data));
                        return true;
                    } else {
                        if (!isSilent) {
                            alert(result.message || 'Error al iniciar sesión');
                            loginForm.classList.add('shake');
                            setTimeout(() => loginForm.classList.remove('shake'), 500);
                        }
                        return false;
                    }
                } catch (error) {
                    if (!isSilent) alert('Error de conexión con el servidor');
                    return false;
                }
            }

            // Auto-login
            const rememberedUser = JSON.parse(localStorage.getItem('rememberedUser'));
            if (rememberedUser) {
                loginUsernameInput.value = rememberedUser.username;
                loginPasswordInput.value = rememberedUser.password;
                rememberMeCheckbox.checked = true;
                if (await attemptLogin(rememberedUser.username, rememberedUser.password, true)) {
                    window.location.href = 'videos.html';
                }
            }

            // Switch Forms
            showRegisterLink.addEventListener('click', () => {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            });
            showLoginLink.addEventListener('click', () => {
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            // Handlers
            loginBtn.addEventListener('click', async () => {
                const username = loginUsernameInput.value.trim();
                const password = loginPasswordInput.value;
                if (!username || !password) return;

                loginBtn.disabled = true;
                loginBtn.textContent = 'Verificando...';

                if (await attemptLogin(username, password)) {
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('rememberedUser', JSON.stringify({ username, password }));
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }
                    window.location.href = 'videos.html';
                } else {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Iniciar Sesión';
                }
            });

            const imageUpload = document.getElementById('image-upload');
            const imagePreview = document.getElementById('image-preview');
            imagePreview.addEventListener('click', () => imageUpload.click());
            imageUpload.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => imagePreview.innerHTML = `<img src="${e.target.result}">`;
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('register-btn').addEventListener('click', async () => {
                const btn = document.getElementById('register-btn');
                const username = document.getElementById('register-username').value.trim();
                const password = document.getElementById('register-password').value;
                const confirm = document.getElementById('register-password-confirm').value;
                const file = imageUpload.files[0];

                if (!username || !password || !file) return alert('Completa todos los campos');
                if (password !== confirm) return alert('Contraseñas no coinciden');

                btn.disabled = true;
                btn.textContent = 'Creando...';

                try {
                    const formData = new FormData();
                    formData.append('image', file);
                    const imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                    const imgData = await imgRes.json();
                    
                    const result = await API.register(username, password, imgData.data.url, 'Activo');
                    if (result.success) {
                        localStorage.setItem('loggedInUser', JSON.stringify(result.data));
                        window.location.href = 'videos.html';
                    } else alert(result.message);
                } catch (e) {
                    alert('Error en el registro');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Comenzar';
                }
            });
        });
    </script>
</body>
</html>
