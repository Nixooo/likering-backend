<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a Likering</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00A4E6">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/FKgZRLrW/image.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

        :root {
            --dark-background: #0a0a0b;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-blue: #00d2ff;
            --accent-purple: #af52de;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-background);
            color: var(--text-primary);
            overflow: hidden;
            min-height: 100vh;
        }

        /* Fondo Animado */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: var(--accent-blue);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            animation: blob-float 20s infinite alternate;
        }

        .blob-1 { top: -150px; right: -150px; animation-delay: 0s; }
        .blob-2 { bottom: -150px; left: -150px; animation-delay: -5s; background: var(--accent-purple); }

        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 150px) scale(1.2); }
        }

        .app-screen {
            width: 100%;
            height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-background);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease-out;
        }

        .splash-screen.hidden { opacity: 0; pointer-events: none; }

        .splash-logo {
            width: 120px;
            animation: logo-pulse 2s infinite ease-in-out;
        }

        @keyframes logo-pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .main-content {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        .main-content.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Tarjeta de Auth Modernizada */
        .auth-card {
            background: linear-gradient(165deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .auth-logo {
            width: 70px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.3));
        }

        .auth-card h2 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 15px 20px 15px 50px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
        }

        .form-button {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            color: #000;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }

        .form-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .form-button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .switch-form-link {
            display: inline-block;
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .switch-form-link:hover { color: var(--accent-blue); }

        .image-preview-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
        }

        .image-preview {
            width: 100%;
            height: 100%;
            border-radius: 30px;
            background: rgba(255,255,255,0.05);
            border: 2px dashed var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .image-preview:hover { border-color: var(--accent-blue); background: rgba(255,255,255,0.08); }
        .image-preview img { width: 100%; height: 100%; object-fit: cover; }
        .image-preview span { font-size: 2rem; color: var(--text-secondary); }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            margin-bottom: 25px;
            color: var(--text-secondary);
        }

        .actions a { color: var(--accent-blue); text-decoration: none; }

        /* Modal Moderno */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-content-custom {
            background: #151517;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.show .modal-content-custom { transform: scale(1); }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="app-screen">
        <!-- Splash Screen -->
        <div class="splash-screen">
            <img src="https://i.postimg.cc/FKgZRLrW/image.png" alt="Likering Logo" class="splash-logo">
        </div>

        <div class="main-content">
            <!-- Login Card -->
            <div class="auth-card" id="login-form">
                <img src="https://i.postimg.cc/PJm3mRTH/image.png" alt="Likering" class="auth-logo">
                <h2>Bienvenido</h2>
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="login-username" placeholder="Nombre de usuario">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Contraseña">
                </div>

                <div class="actions">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="remember-me" style="width: 16px; height: 16px; accent-color: var(--accent-blue);"> Recordarme
                    </label>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button class="form-button" id="login-btn">Iniciar Sesión</button>
                
                <a class="switch-form-link" id="show-register">¿No tienes cuenta? Regístrate</a>
            </div>

            <!-- Register Card -->
            <div class="auth-card" id="register-form" style="display: none;">
                <div class="image-preview-container">
                    <div class="image-preview" id="image-preview">
                        <span><i class="fas fa-camera"></i></span>
                    </div>
                </div>
                <h2>Crear Cuenta</h2>
                <input type="file" id="image-upload" accept="image/*" capture="camera" style="display: none;">
                
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="register-username" placeholder="Nombre de usuario">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="register-password" placeholder="Contraseña">
                </div>
                
                <div class="input-group">
                    <i class="fas fa-shield-alt"></i>
                    <input type="password" id="register-password-confirm" placeholder="Confirmar contraseña">
                </div>

                <button class="form-button" id="register-btn">Registrarse</button>
                
                <a class="switch-form-link" id="show-login">¿Ya tienes cuenta? Inicia Sesión</a>
            </div>
        </div>
    </div>

    <!-- IMPORTANTE: Incluir config.js ANTES del script principal -->
    <script src="config.js"></script>
    
    <script>
        const IMGBB_API_KEY = "df01bb05ce03159d54c33e1e22eba2cf";

        window.addEventListener('load', async () => {
            const splashScreen = document.querySelector('.splash-screen');
            const mainContent = document.querySelector('.main-content');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const showRegisterLink = document.getElementById('show-register');
            const showLoginLink = document.getElementById('show-login');
            const loginUsernameInput = document.getElementById('login-username');
            const loginPasswordInput = document.getElementById('login-password');
            const rememberMeCheckbox = document.getElementById('remember-me');
            const loginBtn = document.getElementById('login-btn');

            // Función de login
            async function attemptLogin(username, password, isSilent = false) {
                try {
                    const result = await API.login(username, password);

                    if (result.success) {
                        // Verificar si el usuario está desactivado
                        if (result.data.estado === 'Desactivo' || result.data.status === 'Desactivo') {
                            if (!isSilent) {
                                showAccountDisabledModal();
                                loginForm.classList.add('shake');
                                loginPasswordInput.value = '';
                                setTimeout(() => loginForm.classList.remove('shake'), 500);
                            }
                            return false;
                        }
                        
                        localStorage.setItem('loggedInUser', JSON.stringify(result.data));
                        return true;
                    } else {
                        if (!isSilent) {
                            alert(result.message || 'Error al iniciar sesión');
                            loginForm.classList.add('shake');
                            loginPasswordInput.value = '';
                            setTimeout(() => loginForm.classList.remove('shake'), 500);
                        }
                        return false;
                    }
                } catch (error) {
                    console.error('Error al verificar el usuario:', error);
                    if (!isSilent) {
                        alert('No se pudo conectar con el servidor. Verifica tu conexión.');
                    }
                    return false;
                }
            }
            
            // Función para mostrar modal de cuenta desactivada
            function showAccountDisabledModal() {
                let modal = document.getElementById('account-disabled-modal');
                if (!modal) {
                    modal = document.createElement('div');
                    modal.id = 'account-disabled-modal';
                    modal.className = 'modal-overlay';
                    modal.innerHTML = `
                        <div class="modal-content-custom">
                            <div class="modal-icon">⚠️</div>
                            <h2>Cuenta Desactivada</h2>
                            <p>Tu cuenta ha sido desactivada. Por favor, comunícate con los Administradores para más información.</p>
                            <button class="modal-close-btn" onclick="document.getElementById('account-disabled-modal').classList.remove('show')">Entendido</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                }
                modal.classList.add('show');
                
                // Cerrar al hacer clic fuera del modal
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('show');
                    }
                });
            }

            // Intento de login silencioso
            const rememberedUser = JSON.parse(localStorage.getItem('rememberedUser'));
            if (rememberedUser && rememberedUser.username && rememberedUser.password) {
                loginUsernameInput.value = rememberedUser.username;
                loginPasswordInput.value = rememberedUser.password;
                rememberMeCheckbox.checked = true;

                const loginSuccessful = await attemptLogin(rememberedUser.username, rememberedUser.password, true);
                if (loginSuccessful) {
                    window.location.href = 'videos.html';
                    return;
                } else {
                    localStorage.removeItem('rememberedUser');
                    rememberMeCheckbox.checked = false;
                }
            }

            // Transición de splash screen
            setTimeout(() => {
                splashScreen.classList.add('hidden');
                setTimeout(() => mainContent.classList.add('active'), 500);
            }, 3000);

            // Cambio de formularios
            showRegisterLink.addEventListener('click', (e) => {
                e.preventDefault();
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            });

            showLoginLink.addEventListener('click', (e) => {
                e.preventDefault();
                registerForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            // Login button handler
            loginBtn.addEventListener('click', async (event) => {
                event.preventDefault();
                const username = loginUsernameInput.value.trim();
                const password = loginPasswordInput.value;

                if (!username || !password) {
                    alert('Por favor, ingresa usuario y contraseña.');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = 'Ingresando...';

                const loginSuccessful = await attemptLogin(username, password);

                if (loginSuccessful) {
                    if (rememberMeCheckbox.checked) {
                        localStorage.setItem('rememberedUser', JSON.stringify({ username, password }));
                    } else {
                        localStorage.removeItem('rememberedUser');
                    }
                    window.location.href = 'videos.html';
                } else {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Iniciar Sesión';
                }
            });

            // Registration logic
            const registerBtn = document.getElementById('register-btn');
            const imageUpload = document.getElementById('image-upload');
            const imagePreview = document.getElementById('image-preview');

            imagePreview.addEventListener('click', () => imageUpload.click());

            imageUpload.addEventListener('change', function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imagePreview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                    }
                    reader.readAsDataURL(file);
                }
            });

            registerBtn.addEventListener('click', async (event) => {
                event.preventDefault();
                const username = document.getElementById('register-username').value.trim();
                const password = document.getElementById('register-password').value;
                const passwordConfirm = document.getElementById('register-password-confirm').value;
                const imageFile = imageUpload.files[0];

                if (!username || !password || !passwordConfirm || !imageFile) {
                    alert('Por favor, completa todos los campos.');
                    return;
                }
                if (password !== passwordConfirm) {
                    alert('Las contraseñas no coinciden.');
                    return;
                }
                if (username.length < 3) {
                    alert('El nombre de usuario debe tener al menos 3 caracteres.');
                    return;
                }

                registerBtn.disabled = true;
                registerBtn.textContent = 'Registrando...';

                try {
                    // 1. Subir imagen a ImgBB
                    const formData = new FormData();
                    formData.append('image', imageFile);
                    const imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const imgbbData = await imgbbResponse.json();
                    if (!imgbbData.success) {
                        throw new Error('Error al subir la imagen');
                    }
                    const imageUrl = imgbbData.data.url;

                    // 2. Registrar usuario en el backend con estado "Activo"
                    // Nota: Si tu API no acepta el campo estado directamente, 
                    // el backend debe establecerlo automáticamente como "Activo" por defecto
                    const registerData = {
                        username: username,
                        password: password,
                        imageUrl: imageUrl,
                        estado: 'Activo' // Enviar estado Activo al registrar
                    };
                    const result = await API.register(username, password, imageUrl, registerData.estado);
                    
                    if (result.success) {
                        alert('¡Registro exitoso! Ahora puedes iniciar sesión.');
                        localStorage.setItem('loggedInUser', JSON.stringify(result.data));
                        window.location.href = 'videos.html';
                    } else {
                        alert(result.message || 'Error al registrar usuario');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Hubo un error al registrar el usuario. Intenta de nuevo.');
                } finally {
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Registrarse';
                }
            });
        });

        // Service Worker - Deshabilitado por ahora
        // Si necesitas PWA, crea el archivo sw.js y descomenta esto
        /*
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
        */
    </script>
</body>
</html>
